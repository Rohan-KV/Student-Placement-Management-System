{% extends 'base.html' %}
{% block content %}
<section class="panel">
  <div class="panel-header">
    <h1>Student Registration</h1>
    <p>Register to apply for placement opportunities.</p>
  </div>
  <form method="post" class="form grid">
    <label>
      Full name
      <input type="text" name="full_name" required />
    </label>
    <label>
      Username
      <input type="text" name="username" required />
    </label>
    <label>
      Student ID
      <input type="number" name="stud_id" required />
    </label>
    <label>
      Department
      <input type="text" name="dept" required />
    </label>
    <label>
      CGPA
      <input type="number" step="0.01" name="cgpa" min="0" max="10" required />
    </label>
    <label>
      Password
      <input type="password" name="password" required />
    </label>
    <button type="submit" class="full">Create Account</button>
  </form>
</section>
{% endblock %}
